# All knobs in one place. Override per-run with --config or by editing this file.
run_id: smoke_14
seed: 42

input:
  pose_source: inputs/pose_source.mp4 # mp4 or directory of frames; drives motion
  face_ref: inputs/face_ref.png # single-image identity reference

generation:
  # Purpose-built ref-image + driving-video character animator. ~28 GB d/l on
  # first run (cached under HF_HOME). Diffusers-format repo with the
  # config.json + sharded safetensors layout the diffusers loader expects.
  model: Wan-AI/Wan2.2-Animate-14B-Diffusers

  width: 512
  height: 768
  # Wan was tuned for low-CFG sampling — 5 is the sweet spot per their docs.
  # Higher than 6 visibly oversaturates and stiffens motion.
  guidance_scale: 5.0
  steps: 30

  fps_generate: 8
  duration_sec: 10 # → 80 frames at 8 FPS

  prompt:
    'RAW photo of an asian man, photograph, dslr, 35mm, soft natural lighting,
    detailed skin pores, photorealistic, professional photography, neutral
    background, shallow depth of field'
  negative_prompt:
    'woman, female, feminine, deformed, blurry, low quality, extra limbs, bad
    anatomy, watermark, text, painting, illustration, cartoon, anime, cgi, 3d
    render, drawing, stylized, oversaturated, hdr, ornate background, cluttered,
    busy background, decorations, lanterns'

interpolation:
  target_fps: 24
  rife_repo: https://github.com/hzwer/Practical-RIFE.git
  rife_model: 4.18

encode:
  codec: libx264
  crf: 18
  pix_fmt: yuv420p
  also_h265: true
  preview_gif: true
